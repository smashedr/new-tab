name: "Release"

on:
  release:
    types: [published]

env:
  PACKAGE_NAME: new-tab
  CHROME_ID: goholgjajaneidafddjpiaphbdaalbhm
  PUBLISHER_ID: 428868da-c02f-433a-b34c-208b3d01fbc3
  MOZILLA_ID: new-tab@cssnr.com
  UPDATE_JSON: update.json

jobs:
  build:
    name: "Build"
    uses: ./.github/workflows/build.yaml
    secrets: inherit
    with:
      version: ${{ github.event.release.tag_name }} # github.ref_name can be empty
    permissions:
      contents: write

  release:
    name: "Release"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [build]

    permissions:
      contents: write

    steps:
      - name: "Debug event.json"
        continue-on-error: true
        run: cat "${GITHUB_EVENT_PATH}"
      - name: "Debug CTX github"
        continue-on-error: true
        env:
          GITHUB_CTX: ${{ toJSON(github) }}
        run: echo "$GITHUB_CTX"
      - name: "Debug Environment"
        continue-on-error: true
        run: env

      - name: "Update Release Notes Action"
        continue-on-error: true
        uses: smashedr/update-release-notes-action@master
        with:
          type: generic

      - name: "Package Changelog Action"
        continue-on-error: true
        uses: cssnr/package-changelog-action@v2

  publish-chrome:
    # https://developer.chrome.com/docs/webstore/using-api
    name: "Publish Chrome"
    if: ${{ !github.event.release.prerelease }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [build]

    environment:
      name: chrome
      url: "https://chromewebstore.google.com/detail/${{ env.CHROME_ID }}"

    steps:
      - name: "Download Artifacts"
        uses: actions/download-artifact@v8
        with:
          name: artifacts

      - name: "Validate"
        run: |
          ls -lAh .
          stat "${{ env.PACKAGE_NAME }}-${{ github.event.release.tag_name }}-chrome.zip"
          yq -e '.version | test("${{ github.event.release.tag_name }}")' chrome-mv3/manifest.json
          echo "::group::chrome-mv3"
          ls -lAh chrome-mv3
          echo "::endgroup::"
          echo "::group::chrome-mv3/manifest.json"
          jq . chrome-mv3/manifest.json
          echo "::endgroup::"

      - name: "Web Store Publish"
        uses: cssnr/webstore-publish-action@v1
        with:
          extension_id: ${{ env.CHROME_ID }}
          publisher_id: ${{env.PUBLISHER_ID}}
          json_data: ${{ secrets.WEBSTORE_JSON }}
          zip_file: "${{ env.PACKAGE_NAME }}-${{ github.event.release.tag_name }}-chrome.zip"
          submit: false

      # TODO: This only submits for review! But maybe now I can download the crx with the token...

  publish-mozilla:
    # https://mozilla.github.io/addons-server/topics/api/index.html
    name: "Publish Mozilla"
    if: ${{ !github.event.release.prerelease }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: [build, publish-chrome]

    permissions:
      contents: write

    environment:
      name: mozilla
      url: "${{ github.server_url }}/${{ github.repository }}/releases/latest/download/${{ env.PACKAGE_NAME }}-firefox.xpi"

    steps:
      - name: "Download Artifacts"
        uses: actions/download-artifact@v8
        with:
          name: artifacts

      - name: "Generate Release Notes"
        env:
          RELEASE_NOTES: ${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ github.event.release.tag_name }}
        run: |
          cat > amo-metadata.json << EOF
          {"version": {"release_notes": {
            "en-US": "Full Release Notes: $RELEASE_NOTES"
          }}}
          EOF

      - name: "Validate"
        run: |
          ls -lAh .
          stat "${{ env.PACKAGE_NAME }}-${{ github.event.release.tag_name }}-sources.zip"
          yq -e '.version | test("${{ github.event.release.tag_name }}")' firefox-mv3/manifest.json
          echo "::group::firefox-mv3"
          ls -lAh firefox-mv3
          echo "::endgroup::"
          echo "::group::firefox-mv3/manifest.json"
          jq . firefox-mv3/manifest.json
          echo "::endgroup::"
          echo "::group::amo-metadata.json"
          jq . amo-metadata.json
          echo "::endgroup::"

      - name: "Sign Mozilla Addon"
        env:
          FIREFOX_API_KEY: ${{ secrets.FIREFOX_API_KEY }}
          FIREFOX_API_SECRET: ${{ secrets.FIREFOX_API_SECRET }}
        run: |
          npx web-ext sign --no-input \
            --api-key="${FIREFOX_API_KEY}" \
            --api-secret="${FIREFOX_API_SECRET}" \
            --channel=unlisted --approval-timeout=2700000 \
            --source-dir="firefox-mv3" \
            --amo-metadata="amo-metadata.json" \
            --upload-source-code="${{ env.PACKAGE_NAME }}-${{ github.event.release.tag_name }}-sources.zip"

      - name: "Debug Artifacts"
        continue-on-error: true
        run: |
          ls -lAh web-ext-artifacts
          echo "::group::ls ."
          ls -lAh .
          echo "::endgroup::"

      - name: "Upload to Actions"
        uses: actions/upload-artifact@v7
        with:
          name: web-ext-artifacts
          path: web-ext-artifacts

      - name: "Upload to Release"
        uses: cssnr/upload-release-action@v1
        with:
          overwrite: true
          #files: "${{ env.PACKAGE_NAME }}-${{ github.event.release.tag_name }}-sources.zip"
          globs: web-ext-artifacts/*.xpi
          names: "${{ env.PACKAGE_NAME }}-firefox.xpi"

  update-mozilla:
    name: "Update Mozilla"
    if: ${{ !github.event.release.prerelease }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [publish-mozilla]

    permissions:
      contents: write

    steps:
      - name: "Checkout"
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: "Mozilla Addon Update"
        uses: cssnr/mozilla-addon-update-action@v1
        with:
          url: "https://github.com/${{ github.repository }}/releases/download/{version}/${{ env.PACKAGE_NAME }}-firefox.xpi"
          addon_id: ${{ env.MOZILLA_ID }}
          version: ${{ github.event.release.tag_name }}

      - name: "Debug ${{ env.UPDATE_JSON }}"
        continue-on-error: true
        run: |
          git status
          echo "::group::cat ${{ env.UPDATE_JSON }}"
          cat "${{ env.UPDATE_JSON }}"
          echo -e "\n::endgroup::"

      - name: "Commit Action"
        id: commit
        uses: suzuki-shunsuke/commit-action@f12e2d628a4ab72dcefe7890ae07e8dbf1e201b9 # v0.1.1
        with:
          branch: master
          #repository: ${{ github.repository }}
          #files: ${{ env.UPDATE_JSON }}
          commit_message: "Bump ${{ env.UPDATE_JSON }} to ${{ github.event.release.tag_name }}"
          #github_token: ${{ steps.app.outputs.token }}
          app_id: 146360
          app_private_key: ${{ secrets.APP_PRIVATE_KEY }}
          fail_on_self_push: false

  check:
    name: "Check"
    if: ${{ always() }}
    runs-on: Ubuntu-latest
    timeout-minutes: 5
    needs: [build, release, publish-chrome, publish-mozilla, update-mozilla]

    permissions:
      contents: write

    steps:
      - name: "Alls Green"
        uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}
          allowed-skips: publish-chrome,publish-mozilla,update-mozilla
          #allowed-failures: release

      #- name: "Cleanup Release"
      #  if: ${{ failure() }}
      #  env:
      #    GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      #  run: |
      #    echo -e "\n## Cleanup Release\n\n" >> "$GITHUB_STEP_SUMMARY"
      #    echo -e "Deleting Release and Tag: \`${{ github.event.release.tag_name }}\`\n\n" >> "$GITHUB_STEP_SUMMARY"
      #    if gh release delete "${{ github.event.release.tag_name }}" --repo "${{ github.repository }}" --cleanup-tag;then
      #      echo -e "✅ Cleanup Success.\n" >> "$GITHUB_STEP_SUMMARY"
      #    else
      #      echo -e "⛔ Cleanup Failed!\n" >> "$GITHUB_STEP_SUMMARY"
      #    fi

      - name: "Send Notification"
        if: ${{ !cancelled() }}
        uses: sarisia/actions-status-discord@eb045afee445dc055c18d3d90bd0f244fd062708 # v1.16.0
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          description: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
